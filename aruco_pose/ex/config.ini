[runtime]
use_gpu = true
use_go2 = false
use_hardware = true
zmq_endpoint = tcp://127.0.0.1:5555
enable_viewer = true

[hardware]
# linear, roll, seg1, seg2
command_direction = -1, -1, 1, -1
motor_direction = -1, -1, -1, 1

[model]
rebuild_robot_assets = false
linear_min = -0.23
linear_max = 0.01
roll_min_deg = -90.0
roll_max_deg = 90.0
bend_deg = 36.0

[spawn]
spawn_position = 0.0,0.0,1.0
spawn_orientation_deg = 0.0,0.0,0.0
draw_debug_markers = true
base1_offset = -0.010,0.065,0.010
base2_offset = -0.030,0.065,0.010
base3_offset = -0.050,0.065,0.010

[colors]
plate = #a0a0a0
housing = #151515
wedge = #383838
node0 = #707070
node1 = #707070
node2 = #707070
node3 = #707070
node4 = #707070
node5 = #707070
node6 = #707070
node7 = #707070
node8 = #707070
node9 = #707070
